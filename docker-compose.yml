services:
  # ── Production ────────────────────────────
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    depends_on:
      mongodb:
        condition: service_started
    restart: unless-stopped

  # ── Development (hot reload, no rebuild) ──
  nextjs-dev:
    image: oven/bun:1
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env.docker
    depends_on:
      mongodb:
        condition: service_started
    command: sh -c "bun install --frozen-lockfile && bun run dev"
    restart: unless-stopped
    profiles:
      - dev

  mongodb:
    image: mongo:8
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: techsphere
    restart: unless-stopped

  rustfs:
    image: rustfs/rustfs:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/logs
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_ADDRESS: ":9001"
      RUSTFS_CORS_ALLOWED_ORIGINS: "*"
      RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: "*"
    restart: unless-stopped

volumes:
  mongodb_data:
  rustfs_data:
  rustfs_logs:
